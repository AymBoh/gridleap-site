  (function() {
    // ── Fix mojibake em dash in Zaher quote ──
    function fixEmDash() {
      const allPs = [...document.querySelectorAll('p')];
      const p = allPs.find(el => el.textContent.includes('Zaher Eltawil'));
      if (!p) return false;
      p.innerHTML = p.innerHTML.replace(/â€[""]/g, '-');
      return true;
    }
    const emTimer = setInterval(function() { if (fixEmDash()) clearInterval(emTimer); }, 150);
    setTimeout(function() { clearInterval(emTimer); }, 10000);
  })();
  </script>

  <script>

      container.innerHTML = `

          <svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m15 14 5-5-5-5'/><path d='M20 9H9.5A5.5 5.5 0 0 0 4 14.5v0A5.5 5.5 0 0 0 9.5 20H13'/></svg>
          <span>Board of Directors</span>
        </div>

        <div id="gl-board-section" style="display:flex;flex-direction:column;gap:32px;">
          <div style="padding:24px;border-radius:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);">
            <div style="font-size:18px;font-family:'Space Grotesk',sans-serif;font-weight:700;margin-bottom:4px;">Dr. Zaher Eltawil</div>
            <div style="font-size:13px;color:rgb(74,222,128);font-weight:500;margin-bottom:16px;letter-spacing:0.02em;">Co-Founder &amp; CEO</div>
            <div style="display:flex;flex-direction:column;gap:12px;color:rgba(255,255,255,0.6);font-size:15px;line-height:1.7;">
              <p style="margin:0;">Dr. Zaher Eltawil is a visionary founder and global leader in energy efficiency, uniquely capable of scaling AI-powered solutions into high-growth markets.</p>

            <div style="font-size:13px;color:rgb(74,222,128);font-weight:500;margin-bottom:16px;letter-spacing:0.02em;">Board Member</div>

      return true;

    const boardObserver = new MutationObserver(injectBoard);
    boardObserver.observe(document.getElementById('root') || document.body, { childList: true, subtree: true });
    injectBoard();

  <script>
  (function() {
    const LOGO = '/assets/mcgill-dobson-logo.png';

    function inject() {
      if (document.getElementById('gl-dobson-section')) return;
      // Target only the hero paragraph — it uniquely has both mb-10 and mx-auto classes
      const heroPara = document.querySelector('p.mb-10.mx-auto');
      if (!heroPara) return;
      const el = document.createElement('div');
      el.id = 'gl-dobson-section';
      el.style.cssText = 'display:flex;align-items:center;justify-content:center;gap:12px;margin-top:32px;padding-top:28px;border-top:1px solid rgba(255,255,255,0.1);';
      el.innerHTML = '<span style="font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.35);white-space:nowrap;align-self:center;margin-top:18px;">Supported by</span><img src="' + LOGO + '" alt="McGill Dobson Centre for Entrepreneurship" style="height:60px;width:auto;object-fit:contain;opacity:0.85;"/>';
      heroPara.parentNode.insertBefore(el, heroPara.nextSibling);
      return true;
    }

    // Use MutationObserver so re-injection fires on every React navigation
    const observer = new MutationObserver(inject);
    observer.observe(document.getElementById('root') || document.body, { childList: true, subtree: true });
    inject();
  })();
  </script>
